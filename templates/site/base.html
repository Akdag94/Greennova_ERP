<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GreenNova Tarım{% endblock %}</title>
    <meta name="generator" content="GreenNova-ERP">
    <meta name="build" content="76a253b5-2026">
    <!-- dev:c4a8f3b2 -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#28a745">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --green: #28a745;
            --green-dark: #1e7e34;
            --green-light: #e8f5ec;
            --dark: #111;
            --text: #222;
            --muted: #666;
            --border: #e0e0e0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #fff; color: var(--text);
            line-height: 1.6;
        }
        a { color: var(--green); text-decoration: none; }
        a:hover { color: var(--green-dark); }

        /* NAVBAR */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            font-weight: 800; font-size: 18px; color: var(--text);
        }
        .nav-brand .dot {
            width: 32px; height: 32px; background: var(--green);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; color: white; font-weight: 800;
            font-size: 16px;
        }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a { color: var(--muted); font-size: 14px; font-weight: 500; }
        .nav-links a:hover { color: var(--green); }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; border-radius: 10px;
            font-weight: 600; font-size: 14px; cursor: pointer;
            border: none; transition: all 0.2s;
        }
        .btn-green { background: var(--green); color: white; }
        .btn-green:hover { background: var(--green-dark); color: white; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 2px solid var(--green); color: var(--green); }
        .btn-outline:hover { background: var(--green); color: white; }

        /* FOOTER */
        footer {
            background: var(--dark); color: #888;
            padding: 32px 24px; text-align: center;
            font-size: 13px;
        }
        footer a { color: var(--green); }

        @media (max-width: 600px) {
            .nav-links { display: none; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<nav>
    <a href="/" class="nav-brand">
        <div class="dot">G</div>
        <span>GreenNova</span>
    </a>
    <div class="nav-links">
        <a href="/#ozellikler">Özellikler</a>
        <a href="/site/yardim/">Rehber</a>
        <a href="/admin/">Yönetim Paneli</a>
        <a href="/inventory/scan/" class="btn btn-green">
            <i class="fas fa-qrcode"></i> QR Terminal
        </a>
    </div>
</nav>

{% block content %}{% endblock %}

<footer>
    <p>© 2026 GreenNova Tarım Ürünleri. Tüm hakları saklıdır.</p>
    <p style="margin-top:6px;">
        <a href="/admin/">Yönetim</a> ·
        <a href="/inventory/scan/">QR Terminal</a> ·
        <a href="/inventory/mobil-giris/">Mobil Kabul</a>
    </p>
</footer>

{% block extra_js %}{% endblock %}
</body>
</html>
