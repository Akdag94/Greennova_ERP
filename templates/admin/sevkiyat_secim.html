{% extends "admin/base_site.html" %}
{% block content %}
<form action="" method="post">
    {% csrf_token %}
    <div style="background: #2c3e50; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
        <h3>🚚 Toplu Sevkiyat Yükleme</h3>
        <p>Seçtiğiniz <b>{{ paletler.count }}</b> adet paleti hangi sevkiyata yüklemek istiyorsunuz?</p>
        <select name="sevkiyat_id" style="padding: 10px; width: 300px; border-radius: 5px;" required>
            {% for s in sevkiyatlar %}
                <option value="{{ s.id }}">{{ s.plaka }} - {{ s.sofor_ad }} ({{ s.gidecegi_yer }})</option>
            {% endfor %}
        </select>
    </div>
    {% for p in paletler %}
        <input type="hidden" name="_selected_action" value="{{ p.pk }}" />
    {% endfor %}
    <input type="hidden" name="action" value="toplu_sevkiyata_yukle" />
    <input type="submit" name="apply" value="Yüklemeyi Tamamla" style="background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;" />
    <a href="#" onclick="window.history.back();" style="margin-left: 15px; color: #7f8c8d;">Vazgeç</a>
</form>
{% endblock %}
